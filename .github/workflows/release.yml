name: Release

# Build the desktop installer and publish it as a GitHub Release asset.
# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push --tags
# Or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    # Prisma's schema datasource reads env("DATABASE_URL"); provide a value so
    # `prisma generate` and the build work on CI (there is no committed .env).
    env:
      DATABASE_URL: "file:./prisma/dev.db"
      # Used by `tauri build` to sign the updater artifacts. Add these repo
      # secrets before releasing (see docs/RELEASING.md); without the private
      # key the signed-updater build fails.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Tauri downloads the NSIS toolchain from GitHub's release CDN during
      # bundling; cache it so it's fetched at most once (the download has been
      # returning intermittent 504s).
      - name: Cache Tauri NSIS toolchain
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri
          key: tauri-nsis-${{ runner.os }}

      # Retry the build to ride out flaky NSIS downloads. Rust output is cached,
      # so retries only redo the (fast) bundling step.
      - name: Build desktop app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm run tauri:build

      # Build the update manifest the app polls. `latest.json` points existing
      # installs at the new signed installer (for NSIS the updater downloads the
      # -setup.exe itself); the endpoint in tauri.conf.json is the "latest
      # release" download URL, so this must ship with every release.
      - name: Generate updater manifest (latest.json)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$dir/*-setup.exe" | Select-Object -First 1
          if (-not $exe) { throw "No installer (*-setup.exe) found" }
          if (-not (Test-Path "$($exe.FullName).sig")) { throw "No signature (.sig) found — is TAURI_SIGNING_PRIVATE_KEY set?" }
          $sig = (Get-Content "$($exe.FullName).sig" -Raw).Trim()
          $version = "${{ github.ref_name }}".TrimStart("v")
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($exe.Name)"
          $manifest = [ordered]@{
            version   = $version
            notes     = "See the release page for what's new."
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $sig; url = $url }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File "$dir/latest.json" -Encoding utf8
          Get-Content "$dir/latest.json"

      - name: Upload installer as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkstash-windows-installer
          path: src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LinkStash ${{ github.ref_name }}
          body: "Download the installer below and run it. Existing installs update themselves automatically."
          draft: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
