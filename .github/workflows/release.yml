name: Release

# Build the desktop installers and publish them as a GitHub Release, with a
# merged multi-platform updater manifest (latest.json).
# Trigger by pushing a version tag, e.g.:  git tag v1.1.0 && git push --tags
# Or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      # Don't cancel the other platforms if one fails — a broken macOS/Linux
      # build must not stop the Windows release from shipping.
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: "nsis"
          - platform: macos-latest
            bundles: "app dmg"
          - platform: ubuntu-latest
            bundles: "deb appimage"
    runs-on: ${{ matrix.platform }}

    env:
      # Prisma's datasource reads env("DATABASE_URL"); provide a value so
      # `prisma generate` and the build work on CI (there is no committed .env).
      DATABASE_URL: "file:./prisma/dev.db"
      # Sign the updater artifacts. The key has no password, so the password is
      # an empty literal — do NOT wire it to a secret (GitHub secrets can't be
      # empty, and a non-empty value makes signing fail). See docs/RELEASING.md.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux needs the WebKitGTK stack (and friends) to build the Tauri webview.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            build-essential \
            file

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Tauri downloads the NSIS toolchain from GitHub's release CDN during
      # bundling on Windows; cache it so it's fetched at most once.
      - name: Cache Tauri NSIS toolchain
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri
          key: tauri-nsis-${{ runner.os }}

      # Retry to ride out flaky bundler downloads. Rust output is cached, so a
      # retry mostly redoes the (fast) bundling step.
      - name: Build desktop app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_wait_seconds: 30
          command: npm run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Generate updater manifest fragment
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: node scripts/updater-fragment.mjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            fragment-*.json

  release:
    needs: build
    # Publish whatever built — so a failed macOS/Linux job doesn't block the
    # Windows release. Missing platforms are simply absent from latest.json.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Merge updater manifest (latest.json)
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/merge-manifest.mjs dist dist/latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LinkStash ${{ github.ref_name }}
          body: "Download the installer for your OS below and run it. Existing installs update themselves automatically."
          draft: false
          fail_on_unmatched_files: false
          # Recursive globs: downloaded artifacts keep their nested bundle paths
          # (dist/src-tauri/target/release/bundle/…). Only latest.json is flat.
          files: |
            dist/**/*-setup.exe
            dist/**/*-setup.exe.sig
            dist/**/*.app.tar.gz
            dist/**/*.app.tar.gz.sig
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.AppImage.sig
            dist/**/*.deb
            dist/latest.json
